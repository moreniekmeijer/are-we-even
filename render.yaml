services:
    - type: web
      name: my-symfony-app
      runtime: docker
      plan: free
      healthCheckPath: /
      envVars:
          - key: APP_ENV
            value: prod
          - key: APP_SECRET
            generateValue: true
          - key: DATABASE_URL
            fromDatabase:
                name: my-symfony-db
                property: connectionString

databases:
    - name: my-symfony-db
      plan: free
